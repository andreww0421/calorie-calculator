<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woof Cal 汪卡管家</title>
    
    <!-- Social Media / Link Preview Meta Tags -->
    <meta name="description" content="用 AI 分析飲食與照片營養，輕鬆追蹤每日熱量、體重與營養節奏。">
    <meta property="og:title" content="Woof Cal 汪卡管家 - AI 飲食與熱量追蹤">
    <meta property="og:description" content="用 AI 分析飲食與照片營養，輕鬆追蹤每日熱量、體重與營養節奏。">
    <meta property="og:image" content="https://andreww0421.github.io/calorie-calculator/calorie_icon.png">
    <meta property="og:url" content="https://andreww0421.github.io/calorie-calculator/index.html">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Woof Cal 汪卡管家">
    <meta name="twitter:description" content="用 AI 分析飲食與照片營養，輕鬆追蹤每日熱量、體重與營養節奏。">
    <meta name="twitter:image" content="https://andreww0421.github.io/calorie-calculator/calorie_icon.png">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://andreww0421.github.io https://challenges.cloudflare.com; connect-src 'self' https://woof-cal-worker.jtwen12345us.workers.dev https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7A6FE0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="calorie_icon.png">
    <link rel="icon" type="image/png" href="calorie_icon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="js/react-home/react-home-island.css">
    <style>
        .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .manual-grid input { width: 100%; font-size: 14px; }
        .small-input-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .small-input-group input { padding: 8px; font-size: 12px; }
        .macro-goal-box { background: rgba(76, 175, 125, 0.1); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9em; line-height: 1.6; color: var(--text-color); }
        
        .pet-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 15px;
            text-align: center;
            box-shadow: 0 1px 3px var(--shadow-color), 0 1px 2px rgba(0,0,0,0.06);
            margin-bottom: var(--spacing-lg);
            border: 1.5px solid rgba(76, 175, 125, 0.18);
            transition: background-color 0.3s, box-shadow 0.2s;
        }
        .pet-image {
            max-width: 120px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .pet-message {
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary-dark);
            font-size: var(--text-body);
            background: var(--primary-light);
            display: inline-block;
            padding: 5px 15px;
            border-radius: var(--radius-pill);
        }
    </style>
</head>
<body>

<div class="container main-content" id="app-container">
    
    <!-- ==================== DAILY VIEW ==================== -->
    <div id="view-daily" class="view-section active-view">

        <div id="onboarding-card" hidden></div>
        <div id="home-react-root" class="home-react-root" aria-live="polite"></div>

    </div>
    
    <!-- ==================== ADD VIEW ==================== -->
    <div id="view-add" class="view-section hidden">
        <div id="add-react-root" class="add-react-root" aria-live="polite"></div>
    </div>

    <!-- ==================== HISTORY VIEW ==================== -->
    <div id="view-history" class="view-section hidden">
        <div class="surface-heading surface-heading--with-date">
            <div>
                <div class="surface-heading__eyebrow" id="txt-history-eyebrow">每日回顧</div>
                <h1 class="surface-heading__title" id="txt-history-title">歷史紀錄</h1>
            </div>
            <div class="dashboard-date-bar history-date-bar">
                <button type="button" class="dashboard-date-arrow" id="btn-dashboard-date-prev" aria-label="Previous date">&#x2039;</button>
                <label class="dashboard-date-display dashboard-date-display--picker" id="btn-change-log-date">
                    <span id="display-date-text">今天</span>
                    <span class="dashboard-date-caret" aria-hidden="true">&#x25BE;</span>
                    <input type="date" id="current-date" class="dashboard-date-input" max="">
                </label>
                <button type="button" class="dashboard-date-arrow" id="btn-dashboard-date-next" aria-label="Next date">&#x203A;</button>
            </div>
        </div>

        <div id="history-react-root" class="history-react-root" aria-live="polite"></div>
    </div>

    <!-- ==================== STATS VIEW ==================== -->
    <div id="view-stats" class="view-section hidden">
        <div id="stats-react-root" class="stats-react-root" aria-live="polite"></div>
    </div>

    <!-- ==================== PROFILE VIEW ==================== -->
    <div id="view-profile" class="view-section hidden">
        <div id="profile-react-root" class="profile-react-root" aria-live="polite"></div>

        <div class="card profile-form-card">
            <h3 id="txt-profile-targets-title">個人營養目標</h3>
            <div class="settings-list">
                <div class="settings-item">
                    <label id="lbl-gender">性別</label>
                    <select id="gender">
                        <option id="opt-male" value="male">男</option>
                        <option id="opt-female" value="female">女</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label id="lbl-age">年齡</label>
                    <input type="number" id="age" placeholder="25" class="settings-input">
                </div>
                <div class="settings-item">
                    <label id="lbl-height">身高 (cm)</label>
                    <input type="number" id="height" placeholder="170" class="settings-input">
                </div>
                <div class="settings-item">
                    <label id="lbl-weight">目標/基準體重 (kg)</label>
                    <input type="number" id="weight" placeholder="60" class="settings-input">
                </div>
                <div class="settings-item">
                    <label id="lbl-activity">活動量</label>
                    <select id="activity">
                        <option id="opt-act-1" value="1.2">久坐 (辦公室)</option>
                        <option id="opt-act-2" value="1.375">輕度 (每週運動 1-3 天)</option>
                        <option id="opt-act-3" value="1.55">中度 (每週運動 3-5 天)</option>
                        <option id="opt-act-4" value="1.725">高度 (每週運動 6-7 天)</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label id="lbl-goal-type">目標</label>
                    <select id="goal-type">
                        <option id="opt-goal-lose" value="lose">減重</option>
                        <option id="opt-goal-maintain" value="maintain">維持體重</option>
                        <option id="opt-goal-gain" value="gain">增肌</option>
                    </select>
                </div>
                <div class="settings-item">
                    <label id="lbl-dining-out-frequency">外食頻率</label>
                    <select id="dining-out-frequency"></select>
                </div>
                <div class="settings-item">
                    <label id="lbl-meal-mode">餐次模式</label>
                    <select id="meal-mode">
                        <option id="opt-mode-4" value="4" selected>標準 (3 餐 + 點心)</option>
                        <option id="opt-mode-3" value="3">3 餐</option>
                        <option id="opt-mode-2" value="2">2 餐 (16:8 斷食)</option>
                        <option id="opt-mode-1" value="1">1 餐 (OMAD)</option>
                    </select>
                </div>
            </div>
            <button id="btn-calc" type="button" style="margin-top: 15px;">儲存設定</button>
            <div id="goal-result" class="goal-section">
                <span id="txt-res-tdee">TDEE</span> <span id="txt-tdee-unit" style="font-size:0.8em; opacity:0.8;">(總消耗熱量)</span>：<span id="tdee-val">0</span> kcal<br>
                <span id="txt-res-target">建議目標</span>：<span id="target-cal-val">0</span> kcal
                <div id="macro-goals" class="macro-goal-box"></div>
            </div>
        </div>

        <div class="card app-settings">
             <h3 id="txt-app-settings-title">App 設定</h3>
             <div class="settings-list">
                 <div class="settings-item clickable" id="btn-open-lang-setting">
                     <span id="menu-lang-setting">語言設定</span>
                     <span class="chevron">></span>
                 </div>
                 <label class="settings-item clickable">
                     <span id="menu-import-setting">匯入備份</span>
                     <input type="file" id="import-file" style="display:none" accept=".json">
                 </label>
                 <div class="settings-item clickable" id="btn-export-setting">
                     <span id="menu-export-setting">匯出備份</span>
                 </div>
             </div>
        </div>
    </div>
</div>

<!-- ==================== BOTTOM NAVIGATION BAR ==================== -->
<nav class="bottom-nav">
    <a href="#" class="nav-item active" data-target="view-daily">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 10v10h14V10"/></svg>
        <span id="txt-nav-home">今天</span>
    </a>
    <a href="#" class="nav-item" data-target="view-history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/><path d="M12 7v5l3 2"/></svg>
        <span id="txt-nav-history">歷史</span>
    </a>
    <a href="#" class="nav-item nav-item--add" data-target="view-add">
        <div class="nav-add-button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </div>
        <span id="txt-nav-add">新增</span>
    </a>
    <a href="#" class="nav-item" data-target="view-stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V9"/><path d="M10 19V5"/><path d="M16 19v-7"/><path d="M22 19V3"/></svg>
        <span id="txt-nav-stats">統計</span>
    </a>
    <a href="#" class="nav-item" data-target="view-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M5 20c1.8-3.4 4.1-5 7-5s5.2 1.6 7 5"></path></svg>
        <span id="txt-nav-profile">我的</span>
    </a>
</nav>

<div class="modal-overlay" id="analysis-modal">
    <div class="modal">
        <h3>✨ <span id="txt-modal-title">AI 分析報告</span></h3>
        <div class="analysis-result" id="analysis-content"></div>
        <button id="btn-ai-fav-save" class="btn-fav-save" style="margin-bottom: 15px; width: 100%;">⭐ <span id="btn-fav-ai">加入最愛</span></button>
        <p id="txt-modal-ask">請問這是哪一餐？</p>
        <div class="meal-selector" id="modal-meal-buttons"></div>
        <button id="btn-cancel" style="margin-top: 15px; background: #95a5a6;">取消</button>
    </div>
</div>
<div class="modal-overlay" id="fav-modal">
    <div class="modal modal--sheet modal--favorites">
        <div class="modal-sheet-header">
            <div>
                <h3><span id="txt-fav-title">常吃食物清單</span></h3>
                <p class="modal-sheet-copy" id="txt-fav-copy">收藏後可直接加入早餐、午餐、晚餐或點心。</p>
            </div>
            <button type="button" class="modal-close-btn" id="btn-fav-close" aria-label="Close">×</button>
        </div>
        <div class="favorite-collection" id="fav-list-container"></div>
    </div>
</div>
<div class="modal-overlay" id="lang-modal" style="display:none;">
    <div class="lang-modal-box">
        <div class="lang-modal-title" id="txt-lang-title">語言</div>
        <div class="lang-list">
            <div class="lang-option" data-lang="zh-TW">繁體中文</div>
            <div class="lang-option" data-lang="zh-CN">简体中文</div>
            <div class="lang-option" data-lang="en">English</div>
        </div>
        <button class="lang-cancel-btn" id="btn-lang-cancel">取消</button>
    </div>
</div>

<div class="modal-overlay" id="detail-modal" style="display:none;">
    <div class="modal modal--detail">
        <div class="analysis-result" id="detail-react-root"></div>
    </div>
</div>
<div class="modal-overlay" id="favorite-meal-modal" style="display:none;">
    <div class="modal modal--sheet modal--favorite-quick-add">
        <div class="modal-sheet-header">
            <div>
                <h3><span id="txt-fav-meal-title">加入今天的餐次</span></h3>
                <p class="modal-sheet-copy" id="txt-fav-meal-ask">先選擇要加入哪一餐，再立即記到今天。</p>
            </div>
            <button type="button" class="modal-close-btn" id="btn-fav-meal-close" aria-label="Close">×</button>
        </div>
        <section class="favorite-quick-add-card" aria-labelledby="fav-meal-food-name">
            <div class="favorite-quick-add-card__header">
                <div>
                    <div class="favorite-quick-add-card__eyebrow" id="txt-fav-meal-eyebrow">收藏餐點</div>
                    <p id="fav-meal-food-name" class="favorite-quick-add-card__title"></p>
                </div>
                <div class="favorite-quick-add-card__score" id="fav-meal-health-score">--</div>
            </div>
            <div class="favorite-quick-add-card__metrics" id="fav-meal-metrics"></div>
        </section>
        <div class="favorite-meal-choice-grid" id="favorite-meal-buttons"></div>
    </div>
</div>
<div class="modal-overlay" id="home-log-modal" style="display:none;">
    <div class="modal modal--sheet">
        <div class="modal-sheet-header">
            <div>
                <h3 id="txt-home-log-modal-title">記錄今天飲食</h3>
                <p class="modal-sheet-copy" id="txt-home-log-modal-copy">先挑最快的入口開始，讓今天的日記保持乾淨好讀。</p>
            </div>
            <button type="button" class="modal-close-btn" id="btn-home-log-close" aria-label="Close">×</button>
        </div>
        <div class="home-log-launcher">
            <button type="button" class="home-log-launcher-card" id="btn-home-log-favorites">
                <span class="home-log-launcher-title" id="btn-home-log-favorites-label">常吃食物</span>
                <span class="home-log-launcher-copy" id="txt-home-log-favorites-copy">從收藏裡挑一筆，直接加到今天的早餐、午餐、晚餐或點心。</span>
            </button>
            <button type="button" class="home-log-launcher-card" id="btn-home-log-manual">
                <span class="home-log-launcher-title" id="btn-home-log-manual-label">新增食物</span>
                <span class="home-log-launcher-copy" id="txt-home-log-manual-copy">前往新增介面，直接使用 AI 照片分析食物。</span>
            </button>
        </div>
    </div>
</div>
<!-- Original FAB menu removed -> Moved to settings -->

<script>
    globalThis.process = globalThis.process || {};
    globalThis.process.env = globalThis.process.env || {};
    globalThis.process.env.NODE_ENV = globalThis.process.env.NODE_ENV || 'production';
</script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/react-home/react-home-island.js"></script>
</body>
</html>
